<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>YEET — Bet UP or DOWN on crypto</title>
    <meta
      name="description"
      content="Pick a game, pick your bet, tap UP or DOWN. Fast bets on live crypto prices."
    />
    <meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https://app.hyperliquid.xyz https://s3-symbol-logo.tradingview.com;" />
    <!-- Self-hosted casino faces (PRD 0008 §5.2): Archivo (display) + IBM Plex Sans
         (body). Preload the primary latin subsets to cut FOUT on the wordmark and
         first chrome. Same-origin, but font requests are always CORS-mode, so the
         crossorigin attribute is required for the preload to be reused. The CSP meta
         sets no default-src, so font-src is unrestricted for same-origin woff2. -->
    <link
      rel="preload"
      href="/fonts/Archivo-Italic-Variable-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Archivo-Variable-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/IBMPlexSans-Variable-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Boot splash: paints the casino page colour + the YEET wordmark during the
         JS-load gap so there is no white flash before React hydrates. The bundled
         CSS is not available yet, so the styles are inlined here. Dark-only — the
         casino theme has no light variant, so the data-theme attribute is fixed
         on <html> above and no theme resolution script is needed. -->
    <style>
      :root {
        --boot-bg: #100e12;
        --boot-ink: #f8f8f8;
      }
      html,
      body {
        margin: 0;
        background: var(--boot-bg);
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        /* Boot layer: sits above the (empty) #root during hydration, then fades.
           Outside the app's semantic z-index scale by design. */
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--boot-bg);
        transition: opacity 240ms ease-out;
      }
      #boot-splash[data-hidden='true'] {
        opacity: 0;
        pointer-events: none;
      }
      /* The wordmark, in the same Archivo wide-italic the app chrome uses, with
         the layered white→cyan neon glow (mirrors --glow-wordmark). */
      #boot-splash .boot-wordmark {
        margin: 0;
        font-family: 'Archivo', system-ui, sans-serif;
        font-style: italic;
        font-stretch: 125%;
        font-weight: 900;
        font-size: 44px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: var(--boot-ink);
        text-shadow:
          0 0 6px rgba(255, 255, 255, 0.45),
          0 0 18px rgba(80, 215, 233, 0.4);
      }
      #boot-splash .boot-caption {
        font-family: 'IBM Plex Sans', system-ui, sans-serif;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: lowercase;
        color: var(--boot-ink);
        opacity: 0.85;
      }
      #boot-splash .boot-dots::after {
        content: '';
        animation: boot-dots 1.2s steps(1, end) infinite;
      }
      @keyframes boot-dots {
        0% {
          content: '';
        }
        25% {
          content: '·';
        }
        50% {
          content: '··';
        }
        75% {
          content: '···';
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash {
          transition: none;
        }
        #boot-splash .boot-dots::after {
          content: '···';
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-splash" role="status" aria-label="Loading">
      <p class="boot-wordmark">YEET</p>
      <p class="boot-caption">loading<span class="boot-dots"></span></p>
    </div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>

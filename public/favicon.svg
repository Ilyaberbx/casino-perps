<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Casino-perps favicon: our own mark. Dark card tile, italic display "Y"
       with the brand's white-core / cyan-halo neon read (PRD 0008 §5). -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#50d7e9" flood-opacity="0.85" />
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#171319" />
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#2e2b30" stroke-width="2" />
  <text
    x="34"
    y="46"
    text-anchor="middle"
    font-family="Archivo, 'Arial Black', system-ui, sans-serif"
    font-style="italic"
    font-weight="900"
    font-size="42"
    fill="#f8f8f8"
    filter="url(#glow)"
  >Y</text>
</svg>
